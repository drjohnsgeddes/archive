<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. John Stafford Geddes | Ulster TV Times</title>
    <meta name="description" content="Ulster TV Times article featuring Dr. John Stafford Geddes, pioneering Northern Irish cardiologist and co-inventor of the world's first mobile coronary care unit.">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; text-align: center; padding: 20px; }
        .article-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        
        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hover and pointer styles for the clickability indicator */
        .clickable-img {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .clickable-img:hover {
            transform: scale(1.015);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .back-btn { display: inline-block; padding: 10px 20px; background: #004080; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    
        /* LIGHTBOX OVERLAY STYLES */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.88);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: zoom-out;
        }

        .lightbox-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 4px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.6);
            transform: scale(0.96);
            transition: transform 0.3s ease;
        }

        .lightbox-overlay.active .lightbox-img {
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div class="article-container">
        <h1>Ulster TV Times</h1>
        
        <img class="clickable-img" src="tvtimes1.jpg" alt="Ulster TV Times article featuring Dr. John Stafford Geddes, cardiac pioneer" title="Click to view full screen">
        <img class="clickable-img" src="tvtimes2.jpg" alt="Ulster TV Times article featuring Dr. John Stafford Geddes, cardiac pioneer - page 2" title="Click to view full screen">
        <br>
        <a href="DRJSGArticles.html" class="back-btn">← Back to Articles Page</a>
    </div>

    <!-- REUSABLE LIGHTBOX OVERLAY -->
    <div id="lightbox" class="lightbox-overlay">
        <img id="lightboxTarget" class="lightbox-img" src="" alt="Expanded View">
    </div>

    <!-- SMART MULTI-IMAGE HISTORY CONTROLLER -->
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            var lightbox = document.getElementById('lightbox');
            var lightboxTarget = document.getElementById('lightboxTarget');
            var clickableImages = document.querySelectorAll('.clickable-img');

            // Safe exit tracking function
            function closeLightbox() {
                if (lightbox.classList.contains('active')) {
                    lightbox.classList.remove('active');
                    // Reset hash history line if present
                    if (window.location.hash === '#view-document') {
                        history.back();
                    }
                }
            }

            // Loop and attach state controllers to all image tags on the page
            clickableImages.forEach(function(image) {
                image.addEventListener('click', function() {
                    lightboxTarget.src = this.src;
                    lightboxTarget.alt = this.alt;
                    lightbox.classList.add('active');
                    // Push fake state tracking token to browser history stack
                    history.pushState({lightbox: true}, null, '#view-document');
                });
            });

            // Handle direct overlay click closeout
            lightbox.addEventListener('click', function() {
                closeLightbox();
            });

            // INTERCEPT THE BACK BUTTON: Dismiss overlay seamlessly
            window.addEventListener('popstate', function(event) {
                if (lightbox.classList.contains('active')) {
                    lightbox.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
